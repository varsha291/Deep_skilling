<h2>Reactive Student Enrollment</h2>

<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()">

  <div>
    <label>Student Name:</label>

    <input
      type="text"
      formControlName="studentName">

    <span
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['required']
      ">
      Name is required
    </span>

    <span
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['minlength']
      ">
      Name must be at least 3 characters
    </span>
  </div>

  <br>

  <div>
    <label>Student Email:</label>

    <input
      type="email"
      formControlName="studentEmail">

    <span
      *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
      Email taken
    </span>
  </div>

  <br>

  <div>
    <label>Course Code:</label>

    <input
      type="text"
      formControlName="courseId">

    <span
      *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
      Course code starting with XX is not allowed.
    </span>
  </div>

  <br>

  <div>
    <label>Preferred Semester:</label>

    <select formControlName="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <br>

  <div>
    <label>
      <input
        type="checkbox"
        formControlName="agreeToTerms">

      Agree to Terms
    </label>
  </div>

  <br>

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">
    Add Another Course
  </button>

  <div formArrayName="additionalCourses">

    <div
      *ngFor="
        let ctrl of additionalCourses.controls;
        let i = index
      ">

      <input [formControlName]="i">

      <button
        type="button"
        (click)="removeCourse(i)">
        Remove
      </button>

    </div>

  </div>

  <br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

</form>
