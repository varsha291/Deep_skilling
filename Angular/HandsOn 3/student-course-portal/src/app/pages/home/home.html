<h1>{{ portalName }}</h1>

<p>Browse courses, enroll in courses, and view your student profile.</p>

<div>
  <p>Courses Available: {{ availableCourses }}</p>
  <p>Enrolled: 3</p>
  <p>GPA: 3.8</p>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search courses">

<p>Searching for: {{ searchTerm }}</p>
