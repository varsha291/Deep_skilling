<h2>Course Details</h2>

<div *ngIf="course">

  <p><b>ID:</b> {{ course.id }}</p>

  <p><b>Name:</b> {{ course.name }}</p>

  <p><b>Code:</b> {{ course.code }}</p>

  <p><b>Credits:</b> {{ course.credits }}</p>

  <p><b>Status:</b> {{ course.gradeStatus }}</p>

</div>

<div *ngIf="!course">
  Course not found.
</div>
