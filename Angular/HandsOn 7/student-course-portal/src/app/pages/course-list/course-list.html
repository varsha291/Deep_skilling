<h2>Course List</h2>

<p *ngIf="isLoading">
  Loading courses...
</p>

<div *ngIf="!isLoading">

  <div *ngIf="courses.length > 0; else noCourses">

    <app-course-card
      *ngFor="
        let course of courses;
        let i = index;
        trackBy: trackByCourseId
      "
      [course]="course"
      (enrollRequested)="openCourse($event)"
      appHighlight="lightblue">
    </app-course-card>

  </div>

  <ng-template #noCourses>
    <p>No courses available.</p>
  </ng-template>

</div>

<p *ngIf="selectedCourseId">
  Selected course ID: {{ selectedCourseId }}
</p>
